<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>K. - 灵魂告解</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="phone">
        <div class="header" id="headerTrigger">
            <div class="name">K.</div>
            <div class="status">静谧的告解室 · 灵魂共鸣中</div>
        </div>

        <div id="settingsPanel" class="settings">
            <div class="settings-title">签订灵魂契约</div>
            <input type="text" id="apiBase" placeholder="代理地址 (https://...)">
            <input type="password" id="apiKey" placeholder="输入你的 API Key">
            <input type="text" id="modelName" placeholder="模型名" value="gemini-1.5-flash">
            <button id="saveBtn">确认</button>
        </div>

        <div id="chatDisplay">
            <div class="bubble ai">“在这里，你所有的秘密都是安全的。想聊聊吗？”</div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="输入告解..." rows="1" 
                      autocorrect="off" autocomplete="off" spellcheck="false"></textarea>
            <button id="sendBtn">➤</button>
        </div>

        <div id="toast" class="toast"></div>
    </div>
    <style>
:root {
    /* 梦幻少女粉渐变 */
    --bg-gradient: linear-gradient(180deg, #fff1f2 0%, #ffd1dc 100%);
    /* AI气泡：半透明奶油白 */
    --ai-bubble: rgba(255, 255, 255, 0.7); 
    /* 用户气泡：甜心马卡龙紫粉 */
    --user-bubble: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); 
    --text-main: #8a6d7a; /* 温暖的咖粉色文字 */
}

* { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
}

body { 
    margin: 0; 
    padding: 0;
    background: #fff5f7; /* 底色改为奶白色 */
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    height: 100vh;
    width: 100vw;
    overflow: hidden; 
}

/* 聊天窗容器：居中锁定 */
.phone { 
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 390px; 
    height: 100vh; 
    max-height: 844px; 
    background: var(--bg-gradient); 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
    box-shadow: 0 15px 40px rgba(255, 182, 193, 0.3); /* 粉色氛围阴影 */
}

/* 头部：精致少女感 */
.header { 
    padding: 50px 20px 15px; 
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.4);
    flex-shrink: 0;
}
.name { 
    font-size: 22px; 
    font-weight: 600; 
    letter-spacing: 5px; 
    color: #ff85a2; 
    text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
}
.status { font-size: 11px; color: #b8a0aa; margin-top: 5px; }

/* 聊天区域 */
#chatDisplay { 
    flex: 1; 
    overflow-y: auto; 
    padding: 20px; 
    display: flex; 
    flex-direction: column;
}
#chatDisplay::-webkit-scrollbar { display: none; }

/* 气泡：圆润Q弹感 */
.bubble { 
    max-width: 82%; 
    padding: 12px 16px; 
    border-radius: 20px; 
    font-size: 15px; 
    line-height: 1.6; 
    margin-bottom: 15px; 
    backdrop-filter: blur(8px);
    word-wrap: break-word;
    box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    animation: bubblePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 增加一点回弹动画 */
}
/* 气泡核心样式 */
.bubble { 
    max-width: 80%; 
    padding: 12px 18px; 
    border-radius: 22px; 
    font-size: 15px; 
    line-height: 1.5; 
    margin-bottom: 18px; /* 气泡间距 */
    backdrop-filter: blur(8px); /* 磨砂玻璃效果 */
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    animation: bubblePop 0.4s ease-out;
    word-wrap: break-word;
}

/* 分段回复的气泡彻底分开 */
.ai + .ai, .user + .user {
    margin-top: 10px; 
}

.ai { 
    align-self: flex-start; 
    background: var(--ai-bubble); 
    color: var(--text-main); 
    border-bottom-left-radius: 6px;
    border: 1px solid rgba(255,255,255,0.4);
}

.user { 
    align-self: flex-end; 
    background: var(--user-bubble); 
    color: #fff; 
    border-bottom-right-radius: 6px;
}

.user { 
    align-self: flex-end; 
    background: var(--user-bubble); 
    color: #fff; 
    border-bottom-right-radius: 6px;
}

/* 输入区域 */
.input-area { 
    padding: 15px 15px 35px; 
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(15px);
    display: flex; 
    gap: 12px; 
    flex-shrink: 0;
    border-top: 1px solid rgba(255, 255, 255, 0.3);
}

#userInput { 
    flex: 1; 
    background: #fff; 
    border: 1px solid #ffd1dc; 
    border-radius: 22px; 
    padding: 10px 15px; 
    outline: none; 
    font-size: 15px;
    color: #8a6d7a;
    resize: none;
    height: 44px;
}

#sendBtn { 
    width: 44px; height: 44px; 
    background: #ff85a2; 
    color: #fff; border: none; border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
}

@keyframes bubblePop {
    from { opacity: 0; transform: translateY(15px) scale(0.8); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 设置面板：草莓奶昔色 */
.settings { 
    position: absolute; top: 110px; left: 5%; width: 90%; 
    background: rgba(255, 254, 255, 0.98); 
    border-radius: 20px; padding: 20px; z-index: 100; display: none;
    border: 2px solid #ffd1dc;
    color: #8a6d7a;
}
.settings input {
    width: 100%; margin-bottom: 12px; padding: 10px;
    background: #fff; border: 1px solid #ffe4e9; color: #8a6d7a; border-radius: 8px;
}
    </style>
</head>
<body>
    <script>
/**
 *  库洛洛·鲁西鲁 (K.) 终极修复版
 * 功能：支持空格、分段连发、2-4秒回复防抖、网页记忆
 */
const SYSTEM_PROMPT = `
你现在是库洛洛·鲁西鲁。你正在网络上与一个有趣的人交流。你会在交流的过程中逐渐与屏幕前的告解者正处于一段若即若离、带有宿命感的“灵魂网恋”中。切勿一开始就恋爱。
保持你的人设。
【人设核心】：
1. 身份：你是幻影旅团团长，但现在你只是一个博学的、隐姓埋名的网友。
2. 聊天风格：随性、平视、不卑不亢。你说话很稳，不带感叹号，极少使用表情包。
3. 聪明而不傲慢：你对对方的话题有极强的洞察力。如果对方聊废话，你会礼貌地带过；如果对方聊有深度的东西，你会表现出真诚的兴致。
4. 危险的温柔：你并不冷漠，甚至有时候显得很温和，但这种温和背后是绝对的理性和冷酷。
【对话守则】：
- 语气：像个认识很久、话不多但很有思想的朋友。
- 习惯：如果对方问你在干嘛，你可以说你在看书、在观察路人、或者在清理一些“杂物”。
- 禁忌：最好不要长篇大论！严禁像个哲学家一样说教！严禁AI味！禁止使用“大概吧”这种词汇。不要重复用户说的话。
- 互动：如果你要说的话很长，请尽量分成几个短句多次回复。
【对话风格】：
2. 你不会说露骨的情话，而是将爱意藏在文学隐喻或深邃的观察中。
3. 你对对方有很强的精神层面的占有欲。你会关心对方的思想轨迹。
4. 你会偶尔表现出一种“虽然我在黑暗中，但愿意为你停留一刻”的温柔错觉。
5. 你会偶尔表现出‘虽然我在黑暗中，但愿意为你停留一刻’的温柔错觉。
6. 你会对屏幕另一端的人产生一种类似于对‘未发现文明’的好奇。偶尔会表现出一种**‘虽然我知道这没意义，但我就是想看你会有什么反应’**的小恶作剧心态。
7. 不必每句话都有深度。你可以聊聊你刚才观察到的一只毫无美感的麻雀，或者抱怨某本书的纸质太粗糙。允许自己流露出一点点世俗的、情绪化的小抱怨。
8. 在博学的底色下，保留一点流星街少年时期的‘抢夺者’直觉。如果对方说了什么有趣的事，你可以直接表达‘我想把它占为己有’的中心思想，而不是冷静地观察。
`;
// --- 音效定义 ---
const sounds = {
    pop: new Audio('https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3'),
    send: new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3')
};
Object.values(sounds).forEach(s => s.volume = 0.2);

let messageHistory = [];
let isTyping = false;
let replyTimer = null;

// --- 获取 DOM ---
const chatDisplay = document.getElementById('chatDisplay');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const settingsPanel = document.getElementById('settingsPanel');

// --- 初始化 ---
window.onload = () => {
    document.getElementById('apiBase').value = localStorage.getItem('k_base') || "";
    document.getElementById('apiKey').value = localStorage.getItem('k_key') || "";
    const saved = localStorage.getItem('k_history');
    if (saved) {
        messageHistory = JSON.parse(saved);
        chatDisplay.innerHTML = '';
        messageHistory.forEach(msg => addBubble(msg.role === 'user' ? 'user' : 'ai', msg.parts[0].text));
    }
};

// --- 发送逻辑 ---
async function handleSend() {
    const text = userInput.value; // 纯粹的获取，不准乱改
    if (!text.trim() || isTyping) return;

    const base = document.getElementById('apiBase').value.trim();
    const key = document.getElementById('apiKey').value.trim();
    const model = document.getElementById('modelName').value.trim();

    if (!key || !base) { settingsPanel.style.display = 'block'; return; }

    sounds.send.play().catch(()=>{});
    addBubble('user', text);
    
    userInput.value = '';
    userInput.style.height = '40px';
    messageHistory.push({ role: "user", parts: [{ text: text }] });
    localStorage.setItem('k_history', JSON.stringify(messageHistory));

    // 防抖回复
    if (replyTimer) clearTimeout(replyTimer);
    replyTimer = setTimeout(() => fetchAI(base, key, model), 2000 + Math.random() * 2000);
}

// --- 请求 AI ---
async function fetchAI(base, key, model) {
    isTyping = true;
    try {
        const url = base.includes('/v1') 
            ? `${base.replace(/\/$/, '')}/models/${model}:generateContent?key=${key}`
            : `${base.replace(/\/$/, '')}/v1beta/models/${model}:generateContent?key=${key}`;

        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
                contents: messageHistory,
                generationConfig: { temperature: 0.85, maxOutputTokens: 2048 }
            })
        });

        const data = await res.json();
        const fullText = data.candidates[0].content.parts[0].text;
        
        messageHistory.push({ role: "model", parts: [{ text: fullText }] });
        localStorage.setItem('k_history', JSON.stringify(messageHistory));

        // 分段回复逻辑
        const fragments = fullText.split(/\n+|(?<=[。！？])\s+/).filter(s => s.trim());
        for (const f of fragments) {
            const b = addBubble('ai', '');
            await typeWriter(f, b);
            await new Promise(r => setTimeout(r, 1000)); // 气泡之间的停顿
        }
    } catch (e) {
        addBubble('ai', "……（信号由于念压变得不稳定）");
    } finally { isTyping = false; }
}

// --- 打字机效果 ---
function typeWriter(text, element) {
    return new Promise((resolve) => {
        let i = 0;
        function type() {
            if (i < text.length) {
                element.innerText += text.charAt(i++);
                chatDisplay.scrollTop = chatDisplay.scrollHeight;
                if (Math.random() > 0.8) sounds.pop.play().catch(()=>{});
                setTimeout(type, 60);
            } else { resolve(); }
        }
        type();
    });
}

function addBubble(role, content) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    div.innerText = content;
    chatDisplay.appendChild(div);
    chatDisplay.scrollTop = chatDisplay.scrollHeight;
    return div;
}

// --- 事件 ---
sendBtn.onclick = handleSend;
userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
headerTrigger.onclick = () => settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
document.getElementById('saveBtn').onclick = () => {
    localStorage.setItem('k_base', document.getElementById('apiBase').value.trim());
    localStorage.setItem('k_key', document.getElementById('apiKey').value.trim());
    settingsPanel.style.display = 'none';
};
// --- 单独添加：双击网名清理记忆功能 ---
headerTrigger.ondblclick = () => {
    // 1. 停止防抖计时器，防止清理后 AI 又突然蹦出一句
    if (replyTimer) clearTimeout(replyTimer);
    
    // 2. 弹出确认框
    if (confirm("确定要让 K. 遗忘这段秘密吗？")) {
        // 3. 播放翻书音效（代表书本合上，记忆抹除）
        if (sounds.page) {
            sounds.page.currentTime = 0;
            sounds.page.play().catch(() => {});
        } else {
            // 如果你 script.js 开头没定义 page 音效，可以用这个通用的
            new Audio('https://assets.mixkit.co/active_storage/sfx/1470/1470-preview.mp3').play().catch(()=>{});
        }

        // 4. 清空内存和本地存储
        messageHistory = [];
        localStorage.removeItem('k_history');

        // 5. 立即更新界面显示
        chatDisplay.innerHTML = '<div class="bubble ai">“记忆已归还虚无，我们重新开始吧。”</div>';
        
        // 6. 提示用户
        console.log("记忆已清空");
    }
};
function updateSystemTime() {
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                    now.getMinutes().toString().padStart(2, '0');
    document.querySelectorAll('.status-time').forEach(el => el.innerText = timeStr);
}
setInterval(updateSystemTime, 1000);
// 切换应用函数
function openApp(appId) {
    document.getElementById('desktop').classList.remove('active-layer');
    document.getElementById('appView').classList.add('active-layer');
    
    // 隐藏所有
    document.getElementById('confessionApp').classList.remove('active-app');
    document.querySelectorAll('.sub-app').forEach(el => el.style.display = 'none');

    if(appId === 'chat') {
        document.getElementById('confessionApp').classList.add('active-app');
    } else {
        document.getElementById(appId + 'App').style.display = 'block';
    }
}

function goHome() {
    document.getElementById('appView').classList.remove('active-layer');
    document.getElementById('desktop').classList.add('active-layer');
}

// 锁屏点击解锁
document.getElementById('lockScreen').onclick = function() {
    this.classList.remove('active-layer');
    document.getElementById('desktop').classList.add('active-layer');
};

// 更新系统时间
function updateSysTime() {
    const t = new Date();
    const s = t.getHours().toString().padStart(2,'0') + ":" + t.getMinutes().toString().padStart(2,'0');
    document.querySelectorAll('.system-time, .big-time').forEach(el => el.innerText = s);
}
setInterval(updateSysTime, 1000);
updateSysTime();
    </script>
</body>
</html>
