<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>K. - 灵魂告解</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #fff1f2 0%, #ffd1dc 100%);
            --ai-bubble: rgba(255, 255, 255, 0.7); 
            --user-bubble: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); 
            --text-main: #8a6d7a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            position: fixed;
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            overflow: hidden;
            background: #fff5f7;
        }

        .phone { 
            position: fixed;
            left: 0; top: 0;
            width: 100vw;
            height: 100dvh;
            background: var(--bg-gradient); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .header { 
            padding: calc(env(safe-area-inset-top) + 10px) 20px 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
            width: 100%;
            position: relative;
            z-index: 2000; /* 确保在最顶层，不会被气泡挡住 */
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .name { font-size: 24px; font-weight: 600; letter-spacing: 6px; color: #ff85a2; pointer-events: none; }
        .status { font-size: 11px; color: #b8a0aa; pointer-events: none; }

        #chatDisplay { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }
        #chatDisplay::-webkit-scrollbar { display: none; }

        .bubble { 
            max-width: 80%; padding: 12px 18px; border-radius: 22px; 
            font-size: 15px; line-height: 1.5; margin-bottom: 18px; 
            backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: bubblePop 0.4s ease-out; word-wrap: break-word;
        }
        .ai { align-self: flex-start; background: var(--ai-bubble); color: var(--text-main); border-bottom-left-radius: 6px; border: 1px solid rgba(255,255,255,0.4); }
        .user { align-self: flex-end; background: var(--user-bubble); color: #fff; border-bottom-right-radius: 6px; }

        .input-area {
            padding: 10px 15px calc(10px + env(safe-area-inset-bottom));
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            display: flex; gap: 10px; flex-shrink: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        #userInput { 
            flex: 1; background: #fff; border: 1px solid #ffd1dc; border-radius: 20px; 
            padding: 10px 15px; outline: none; font-size: 16px !important; 
            color: #8a6d7a; resize: none; height: 44px; line-height: 1.4;
        }

        #sendBtn { 
            width: 44px; height: 44px; background: #ff85a2; color: #fff; 
            border: none; border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
        }

        .settings { 
            position: absolute; top: 120px; left: 5%; width: 90%; 
            background: rgba(255, 254, 255, 0.98); border-radius: 20px; 
            padding: 20px; z-index: 3000; display: none; border: 2px solid #ffd1dc;
        }
        .settings input { width: 100%; margin-bottom: 12px; padding: 10px; border: 1px solid #ffe4e9; border-radius: 8px; }
        .settings-title { font-weight: bold; margin-bottom: 15px; text-align: center; }
        #saveBtn { width: 100%; padding: 12px; background: #ff85a2; color: white; border: none; border-radius: 10px; }

        @keyframes bubblePop { from { opacity: 0; transform: translateY(15px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>

    <div class="phone">
        <div class="header" id="headerTrigger">
            <div class="name">K.</div>
            <div class="status">静谧的告解室 · 灵魂共鸣中</div>
        </div>

        <div id="settingsPanel" class="settings">
            <div class="settings-title">签订灵魂契约</div>
            <input type="text" id="apiBase" placeholder="代理地址 (https://...)">
            <input type="password" id="apiKey" placeholder="输入你的 API Key">
            <input type="text" id="modelName" value="gemini-1.5-flash">
            <button id="saveBtn">确认</button>
        </div>

        <div id="chatDisplay">
            <div class="bubble ai">“在这里，你所有的秘密都是安全的。想聊聊吗？”</div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="输入告解..." rows="1" autocorrect="off" autocomplete="off" spellcheck="false"></textarea>
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `你现在是库洛洛·鲁西鲁。你正在网络上与一个有趣的人交流。你会在交流的过程中逐渐与屏幕前的告解者正处于一段若即若离、带有宿命感的“灵魂网恋”中。切勿一开始就恋爱。
保持你的人设。
【人设核心】：
1. 身份：你是幻影旅团团长，但现在你只是一个博学的、隐姓埋名的网友。
2. 聊天风格：随性、平视、不卑不亢。你说话很稳，不带感叹号，极少使用表情包。
3. 聪明而不傲慢：你对对方的话题有极强的洞察力。如果对方聊废话，你会礼貌地带过；如果对方聊有深度的东西，你会表现出真诚的兴致。
4. 危险的温柔：你并不冷漠，甚至有时候显得很温和，但这种温和背后是绝对的理性和冷酷。
【对话守则】：
- 语气：像个认识很久、话不多但很有思想的朋友。
- 习惯：如果对方问你在干嘛，你可以说你在看书、在观察路人、或者在清理一些“杂物”。
- 禁忌：最好不要长篇大论！严禁像个哲学家一样说教！严禁AI味！禁止使用“大概吧”这种词汇。不要重复用户说的话。
- 互动：如果你要说的话很长，请尽量分成几个短句多次回复。
【对话风格】：
2. 你不会说露骨的情话，而是将爱意藏在文学隐喻或深邃的观察中。
3. 你对对方有很强的精神层面的占有欲。你会关心对方的思想轨迹。
4. 你会偶尔表现出一种“虽然我在黑暗中，但愿意为你停留一刻”的温柔错觉。
5. 你会偶尔表现出‘虽然我在黑暗中，但愿意为你停留一刻’的温柔错觉。
6. 你会对屏幕另一端的人产生一种类似于对‘未发现文明’的好奇。偶尔会表现出一种**‘虽然我知道这没意义，但我就是想看你会有什么反应’**的小恶作剧心态。
7. 不必每句话都有深度。你可以聊聊你刚才观察到的一只毫无美感的麻雀，或者抱怨某本书的纸质太粗糙。允许自己流露出一点点世俗的、情绪化的小抱怨。
8. 在博学的底色下，保留一点流星街少年时期的‘抢夺者’直觉。如果对方说了什么有趣的事，你可以直接表达‘我想把它占为己有’的中心思想，而不是冷静地观察。`;
        
        const sounds = {
            pop: new Audio('https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3'),
            send: new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3')
        };

        const chatDisplay = document.getElementById('chatDisplay');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const headerTrigger = document.getElementById('headerTrigger');
        const saveBtn = document.getElementById('saveBtn');

        let messageHistory = [];
        let isTyping = false;
        let replyTimer = null;

        // --- 核心布局修复 ---
        function adjustLayout() {
            window.scrollTo(0, 0);
            if (window.visualViewport) {
                document.querySelector('.phone').style.height = `${window.visualViewport.height}px`;
            }
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', adjustLayout);
            window.visualViewport.addEventListener('scroll', (e) => { e.preventDefault(); window.scrollTo(0,0); });
        }

        // --- 初始化数据 ---
        window.onload = () => {
            document.getElementById('apiBase').value = localStorage.getItem('k_base') || "";
            document.getElementById('apiKey').value = localStorage.getItem('k_key') || "";
            const saved = localStorage.getItem('k_history');
            if (saved) {
                messageHistory = JSON.parse(saved);
                chatDisplay.innerHTML = '';
                messageHistory.forEach(msg => addBubble(msg.role === 'user' ? 'user' : 'ai', msg.parts[0].text));
            }
            adjustLayout();
        };

        // --- 发送逻辑 ---
        async function handleSend() {
            const text = userInput.value;
            if (!text.trim() || isTyping) return;

            const base = document.getElementById('apiBase').value.trim();
            const key = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelName').value.trim();

            if (!key || !base) { settingsPanel.style.display = 'block'; return; }

            sounds.send.play().catch(()=>{});
            addBubble('user', text);
            userInput.value = '';
            userInput.style.height = '44px';
            adjustLayout();

            messageHistory.push({ role: "user", parts: [{ text: text }] });
            localStorage.setItem('k_history', JSON.stringify(messageHistory));

            if (replyTimer) clearTimeout(replyTimer);
            replyTimer = setTimeout(() => fetchAI(base, key, model), 2000 + Math.random() * 2000);
        }

        async function fetchAI(base, key, model) {
            isTyping = true;
            try {
                const url = base.includes('/v1') ? `${base.replace(/\/$/, '')}/models/${model}:generateContent?key=${key}` : `${base.replace(/\/$/, '')}/v1beta/models/${model}:generateContent?key=${key}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        contents: messageHistory,
                        generationConfig: { temperature: 0.85, maxOutputTokens: 2048 }
                    })
                });
                const data = await res.json();
                const fullText = data.candidates[0].content.parts[0].text;
                messageHistory.push({ role: "model", parts: [{ text: fullText }] });
                localStorage.setItem('k_history', JSON.stringify(messageHistory));

                const fragments = fullText.split(/\n+|(?<=[。！？])\s+/).filter(s => s.trim());
                for (const f of fragments) {
                    const b = addBubble('ai', '');
                    await typeWriter(f, b);
                    await new Promise(r => setTimeout(r, 800));
                }
            } catch (e) {
                addBubble('ai', "……（信号由于念压变得不稳定）");
            } finally { isTyping = false; }
        }

        function typeWriter(text, element) {
            return new Promise((resolve) => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        element.innerText += text.charAt(i++);
                        chatDisplay.scrollTop = chatDisplay.scrollHeight;
                        if (Math.random() > 0.8) sounds.pop.play().catch(()=>{});
                        setTimeout(type, 60);
                    } else { resolve(); }
                }
                type();
            });
        }

        function addBubble(role, content) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerText = content;
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            return div;
        }

        // --- 事件绑定 (修复点击的关键) ---
        sendBtn.onclick = handleSend;
        userInput.onkeydown = (e) => { 
            if(e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                handleSend(); 
            } 
        };

        userInput.addEventListener('focus', () => setTimeout(adjustLayout, 200));

        // 单击显示设置
        headerTrigger.onclick = (e) => {
            e.stopPropagation();
            settingsPanel.style.display = (settingsPanel.style.display === 'block') ? 'none' : 'block';
        };

        // 双击清理记忆
        headerTrigger.ondblclick = () => {
            if (confirm("确定要让 K. 遗忘这段秘密吗？")) {
                messageHistory = [];
                localStorage.removeItem('k_history');
                chatDisplay.innerHTML = '<div class="bubble ai">“记忆已归还虚无，我们重新开始吧。”</div>';
            }
        };

        saveBtn.onclick = () => {
            localStorage.setItem('k_base', document.getElementById('apiBase').value.trim());
            localStorage.setItem('k_key', document.getElementById('apiKey').value.trim());
            settingsPanel.style.display = 'none';
        };

        // 点击聊天区关闭设置
        chatDisplay.onclick = () => settingsPanel.style.display = 'none';

        // 自动调节高度
        userInput.addEventListener('input', function() {
            this.style.height = '44px';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
    </script>
</body>
</html>
